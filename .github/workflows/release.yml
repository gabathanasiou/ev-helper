name: Release

# Triggers when you push a tag like v1.0.5
on:
  push:
    tags:
      - 'v*'

# Grant top-level permissions to all jobs
permissions:
  contents: write

jobs:
  # -- Job 1: Build CLI binaries (Linux runner -- builds all platforms via pkg) --
  build-cli:
    name: Build CLI Binaries
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install
        working-directory: cli-app

      - name: Build all platform binaries
        run: npm run build:all
        working-directory: cli-app

      - name: Create tarballs
        working-directory: cli-app/bin
        run: |
          tar -czf ev-helper-cli-macos-arm64.tar.gz ev-helper-macos-arm64
          tar -czf ev-helper-cli-macos-x64.tar.gz ev-helper-macos-x64
          tar -czf ev-helper-cli-linux-x64.tar.gz ev-helper-linux-x64
          zip ev-helper-cli-win-x64.zip ev-helper-win-x64.exe

      - name: Compute SHA256 checksums
        working-directory: cli-app/bin
        run: |
          sha256sum \
            ev-helper-cli-macos-arm64.tar.gz \
            ev-helper-cli-macos-x64.tar.gz \
            ev-helper-cli-linux-x64.tar.gz \
            ev-helper-cli-win-x64.zip > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Upload CLI artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cli-binaries
          path: |
            cli-app/bin/ev-helper-cli-macos-arm64.tar.gz
            cli-app/bin/ev-helper-cli-macos-x64.tar.gz
            cli-app/bin/ev-helper-cli-linux-x64.tar.gz
            cli-app/bin/ev-helper-cli-win-x64.zip
            cli-app/bin/SHA256SUMS.txt

  # -- Job 2: Build Electron DMG (needs macOS runner for .dmg creation) --
  build-electron:
    name: Build Electron App
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build Electron DMG
        run: npm run dist

      - name: Rename DMG for clarity
        run: |
          cd dist
          mv *.dmg ev-helper-desktop-macos.dmg

      - name: Upload Electron artifact
        uses: actions/upload-artifact@v4
        with:
          name: electron-dmg
          path: dist/ev-helper-desktop-macos.dmg

  # -- Job 3: Create GitHub Release with everything --
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-cli, build-electron]

    steps:
      - name: Download CLI artifacts
        uses: actions/download-artifact@v4
        with:
          name: cli-binaries
          path: release-files

      - name: Download Electron artifact
        uses: actions/download-artifact@v4
        with:
          name: electron-dmg
          path: release-files

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: false
          body: |
            ## 🌿 EV Helper ${{ github.ref_name }}

            > A blazing fast EV training tool for Pokémon FireRed/LeafGreen & R/S/E

            **🌐 Web App** -- [gabathanasiou.github.io/ev-helper](https://gabathanasiou.github.io/ev-helper/)
            **📦 npm** -- [@gabathanasiou/ev-helper](https://www.npmjs.com/package/@gabathanasiou/ev-helper)

            ---

            ### 🖥️ Desktop App (macOS)

            | File | Description |
            |---|---|
            | `ev-helper-desktop-macos.dmg` | macOS desktop app -- drag to Applications |

            ### 💻 CLI -- Command Line App

            | File | Platform |
            |---|---|
            | `ev-helper-cli-macos-arm64.tar.gz` | macOS Apple Silicon |
            | `ev-helper-cli-macos-x64.tar.gz` | macOS Intel |
            | `ev-helper-cli-linux-x64.tar.gz` | Linux x64 |
            | `ev-helper-cli-win-x64.zip` | Windows x64 |

            **Install CLI via Homebrew (no Node.js required):**
            ```bash
            brew tap gabathanasiou/ev-helper
            brew install ev-helper
            ```

            **Install CLI via npm:**
            ```bash
            npx @gabathanasiou/ev-helper
            ```
          files: |
            release-files/ev-helper-desktop-macos.dmg
            release-files/ev-helper-cli-macos-arm64.tar.gz
            release-files/ev-helper-cli-macos-x64.tar.gz
            release-files/ev-helper-cli-linux-x64.tar.gz
            release-files/ev-helper-cli-win-x64.zip
            release-files/SHA256SUMS.txt

  # -- Job 4: Auto-update Homebrew formula --
  update-homebrew:
    name: Update Homebrew Formula
    runs-on: ubuntu-latest
    needs: create-release
    continue-on-error: true
    steps:
      - name: Download SHA256SUMS
        uses: actions/download-artifact@v4
        with:
          name: cli-binaries

      - name: Extract checksums
        id: sums
        run: |
          echo "arm64=$(grep macos-arm64 SHA256SUMS.txt | awk '{print $1}')" >> $GITHUB_OUTPUT
          echo "x64=$(grep macos-x64 SHA256SUMS.txt | awk '{print $1}')" >> $GITHUB_OUTPUT
          echo "linux=$(grep linux-x64 SHA256SUMS.txt | awk '{print $1}')" >> $GITHUB_OUTPUT

      - name: Checkout Homebrew tap
        uses: actions/checkout@v4
        with:
          repository: gabathanasiou/homebrew-ev-helper
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update formula version and SHA256s
        env:
          VERSION: ${{ github.ref_name }}
          ARM64: ${{ steps.sums.outputs.arm64 }}
          X64: ${{ steps.sums.outputs.x64 }}
          LINUX: ${{ steps.sums.outputs.linux }}
        run: |
          cd homebrew-tap
          VER="${VERSION#v}"
          sed -i "s/version \".*\"/version \"$VER\"/" Formula/ev-helper.rb
          python3 - <<'EOF'
          import re, os

          arm64 = os.environ['ARM64']
          x64   = os.environ['X64']
          linux = os.environ['LINUX']

          with open('Formula/ev-helper.rb', 'r') as f:
              content = f.read()

          lines = content.split('\n')
          for i, line in enumerate(lines):
              prev = lines[i-1] if i > 0 else ''
              if 'macos-arm64' in prev and 'sha256' in line:
                  lines[i] = re.sub(r'sha256 ".*"', f'sha256 "{arm64}"', line)
              elif 'macos-x64' in prev and 'sha256' in line:
                  lines[i] = re.sub(r'sha256 ".*"', f'sha256 "{x64}"', line)
              elif 'linux-x64' in prev and 'sha256' in line:
                  lines[i] = re.sub(r'sha256 ".*"', f'sha256 "{linux}"', line)

          with open('Formula/ev-helper.rb', 'w') as f:
              f.write('\n'.join(lines))
          EOF

      - name: Commit and push
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/ev-helper.rb
          git commit -m "Update to $VERSION"
          git push
